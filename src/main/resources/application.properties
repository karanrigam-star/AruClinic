# AruClinic Healthcare Management System - Application Properties

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/aruclinicdb?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:aruclinic_app}
spring.datasource.password=${DB_PASSWORD:AppSecurePassword@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.hibernate.ddl-auto=update

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
#spring.flyway.baseline-version=1
spring.flyway.validate-on-migrate=true

# Application Secrets
jwt.secret=${JWT_SECRET:9xT7mP4qLs8Kd2NwV5bHr1YzC6eFa3Jk8LmNp2Qr7StUv9WxABCDEFGHIJKLMNOPQRSTUVWXYZabcdef}
jwt.expiration=86400000
jwt.refresh-expiration=604800000
jwt.issuer=AruClinic

# Security Configuration
# Default Spring Security credentials removed - use proper authentication

# Vaadin Configuration
#vaadin.routing.scheme=https
vaadin.productionMode=false
vaadin.terminal.idle-timeout-enabled=true
vaadin.terminal.idle-timeout=15

# Logging Configuration
logging.level.org.springframework.boot.autoconfigure.security=WARN
logging.level.com.aruclinic=INFO

# Sample data configuration
app.data.seed=true

# Cookie Security Configuration
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# Mail Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true